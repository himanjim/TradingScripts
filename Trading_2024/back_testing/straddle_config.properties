# =============================================================================
# straddle_config.properties
# -----------------------------------------------------------------------------
# Configuration for atm_straddle_claude_reattempt_pct_risk.py
#
# Format : KEY=VALUE  (one per line). Lines starting with # or ; are comments.
# Loading: the script reads this file at startup (place it in the SAME folder
#          as the script, or point STRADDLE_CONFIG at it). A real environment
#          variable that is already set OVERRIDES the value here.
# =============================================================================

# ---- Data location ---------------------------------------------------------
# Folder containing the option-data pickle files (*.pkl / *.pickle).
#PICKLES_DIR=G:\My Drive\Trading\Dhan_Historical_Options_Data_New
#PICKLES_DIR=G:\My Drive\Trading\Dhan_Historical_Options_Data_New_0_1
PICKLES_DIR=G:\My Drive\Trading\Historical_Options_Data

# ---- Entry -----------------------------------------------------------------
# Time of the first straddle entry each day, IST, "HH:MM".
ENTRY_TIME_IST=10:00
# Last time after which NO fresh entry/re-entry is initiated, IST, "HH:MM".
# This is not a forced square-off. Open trades continue with the existing exit logic.
EXIT_TIME_IST=15:00

# Days-to-expiry to actually trade (comma list).
#   0     = expiry day only
#   0,1   = expiry day and the day before
ALLOWED_DTE=0

# ---- Stop-loss -------------------------------------------------------------
# Per-attempt stop-loss as a fraction of the premium collected on that attempt
# (index 0 = first entry, 1 = first re-entry, ...). Comma list; attempts beyond
# the list reuse the last value. Accepts decimals (0.25) or percents (25).
LOSS_LIMIT_RUPEES_BY_ATTEMPT=0.3716, 0.3969, 0.4222, 0.4475, 0.4728, 0.4982, 0.5235, 0.5488

# Absolute rupee CAP applied to the %-based stop-loss per attempt.
# Effective stop = min(STOP_PCT * premium, this cap). Set 0 to disable the cap.
MAX_LOSS_LIMIT_RUPEES_BY_ATTEMPT=3000

# ---- Profit-protect --------------------------------------------------------
# Arm + trailing give-back as a fraction of the premium collected. 0 disables.
# Accepts decimals (0.25) or percents (25).
PROFIT_PROTECT_TRIGGER_RUPEES=0.3755
# Absolute rupee CAP applied to the %-based profit-protect trigger/giveback.
# Effective G = min(PROFIT_PROTECT_% * premium, this cap). Set 0 to disable the cap.
#MAX_PROFIT_PROTECT_TRIGGER_RUPEES=10000

# ---- Profit target (ends the day) -----------------------------------------
# Per-attempt profit target as a fraction of premium; on hit, exit and take no
# more trades that day. 0 disables. e.g. 0.70 = 70%.
PROFIT_TARGET_PCT=0.8090

# ---- Daily circuit breaker -------------------------------------------------
# Stop the day once cumulative realized loss reaches this many rupees.
# 0 disables.
MAX_DAILY_LOSS_RUPEES=30000

# ---- Re-entries ------------------------------------------------------------
# Maximum number of re-entries after a STOPLOSS / PROFIT_PROTECT exit.
MAX_REATTEMPTS=10

# Per-attempt re-entry gap in minutes (index 0 = gap before the 1st re-entry).
# Comma list; attempts beyond the list reuse the last value.
REENTRY_DELAY_BY_ATTEMPT=8, 8, 8, 8, 8, 8, 8, 8, 10, 10, 10

# ---- Backtest window -------------------------------------------------------
# AUTO = use the full date range present in the pickles. Or set a number of
# months to cap the lookback.
LOOKBACK_MONTHS=AUTO

# ---- Misc ------------------------------------------------------------------
# 1 = abort the run if any pickle errors; 0 = skip the bad pickle and continue.
FAIL_ON_PICKLE_ERROR=0

# Output Excel path. Leave commented to auto-name into your Downloads folder.
# OUTPUT_XLSX=
