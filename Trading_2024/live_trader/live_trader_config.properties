# =============================================================================
# live_trader_config.properties
# -----------------------------------------------------------------------------
# Configuration for live_short_straddle_trader.py
#
# Format : KEY=VALUE (one per line). Lines starting with # or ; are comments.
# Loading: the trader reads this at startup (keep it in the SAME folder as the
#          script, or point STRADDLE_LIVE_CONFIG at it). A real environment
#          variable that is already set OVERRIDES the value here.
#
# >>> SAFETY: PAPER_TRADING=1 means NO real orders are sent. Set it to 0 ONLY
#     when you are ready to trade live with real money. <<<
# =============================================================================

# ---- Mode ------------------------------------------------------------------
# 1 = paper trading (simulated fills, no real orders). 0 = LIVE real orders.
PAPER_TRADING=1

# ---- Timing (IST, "HH:MM") -------------------------------------------------
ENTRY_TIME_IST=09:55
# Square off everything a little before the close to avoid EOD illiquidity.
SQUAREOFF_TIME_IST=15:20

# ---- Stop-loss -------------------------------------------------------------
# Per-attempt stop as a fraction of premium collected (comma list; index 0 =
# first entry). Attempts beyond the list reuse the last value.
STOP_PCT_BY_ATTEMPT=0.2487,0.2824,0.3162,0.3499,0.3837,0.4174,0.4512
# Absolute rupee cap on the %-based stop. Effective = min(pct*premium, cap).
# 0 disables the cap.
STOP_CAP_RUPEES=3000

# ---- Profit-protect (arm + trailing give-back, fraction of premium) --------
# 0 disables.
PROFIT_PROTECT_PCT=0.254741

# ---- Per-day profit target (fraction of premium; ends the day on hit) ------
# 0 disables.
PROFIT_TARGET_PCT=0.779933

# ---- Re-entries ------------------------------------------------------------
# Per-attempt re-entry gap in minutes (comma list; index 0 = before 1st re-entry).
REENTRY_DELAY_BY_ATTEMPT=6,8,10,12,14,16,18
# Maximum number of re-entries after a STOPLOSS / PROFIT_PROTECT exit.
MAX_REATTEMPTS=6

# ---- Daily circuit breaker -------------------------------------------------
# Stop the day once cumulative realized loss reaches this many rupees. 0 disables.
MAX_DAILY_LOSS_RUPEES=30000

# ---- Days-to-expiry --------------------------------------------------------
# Comma list. 0 = expiry day only; 0,1 = expiry day and the day before.
ALLOWED_DTE=0
# DTE gate toggle (see code; currently informational).
ENFORCE_DTE=0

# ---- Feed / monitoring -----------------------------------------------------
# How often (seconds) the strategy re-evaluates exit conditions against the
# latest tick. Kite delivers at most ~1 tick/sec per instrument, so 1.0 is the
# least-frequent cadence that still catches every update. Lower = no benefit.
MONITOR_POLL_SECONDS=1.0
# How often (seconds) to log a P&L heartbeat line while in a position.
MONITOR_HEARTBEAT_SECONDS=15
# Simulated adverse fill in ticks (paper mode only).
PAPER_SLIPPAGE_TICKS=1
# Option price tick size.
OPTION_TICK=0.05

# ---- Logging ---------------------------------------------------------------
# Leave commented to use the default (~/short_straddle_live.log).
# LOG_FILE=C:\Users\himan\short_straddle_live.log

# ---- Resilience: API retry/backoff (Zerodha outages) -----------------------
# 0 = retry reads forever (pause through an outage instead of crashing).
API_MAX_RETRIES=0
# Bounded retries for ORDER placement (avoids duplicate orders on lost replies).
API_ORDER_MAX_RETRIES=5
# Backoff base and cap (seconds) for the exponential retry.
API_RETRY_BACKOFF_SECONDS=2
API_RETRY_BACKOFF_MAX=30

# ---- Resilience: crash/restart state file ----------------------------------
# Where the trader persists today's phase / attempt / P&L / open position so a
# restart RESUMES the day. Leave commented for the default (~/short_straddle_state.json).
# STATE_FILE=C:\Users\himan\short_straddle_state.json
